name: Domain Recon CI

on:
  schedule:
    # 每天北京时间早上 6:00 运行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"
      FORCE_COLOR: "1"

    steps:
      # ── 1. 拉取代码 ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 配置 Python 环境 ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装依赖 ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          echo "::group::pip install"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "::endgroup::"
          echo "依赖安装完成，已安装包列表:"
          pip list

      # ── 4. 执行侦察脚本 ────────────────────────────────────────
      - name: Run Domain Recon
        run: |
          echo "::group::运行参数"
          echo "目标域名 : shu.edu.cn"
          echo "最高并发 : 300"
          echo "输出模式 : --md-only --no-progress"
          echo "::endgroup::"

          echo "::group::侦察日志"
          printf 'RECON_START=%s\n' "$(date +%s)" >> $GITHUB_ENV
          python run.py shu.edu.cn 300 --md-only --no-progress
          printf 'RECON_END=%s\n' "$(date +%s)" >> $GITHUB_ENV
          echo "::endgroup::"

      # ── 5. 展示生成的报告内容 ─────────────────────────────────
      - name: Show generated report
        run: |
          echo "::group::analysis_report.md 内容预览"
          MD_FILE=$(find output -name "*.md" 2>/dev/null | head -1)
          if [ -n "$MD_FILE" ]; then
            echo "报告路径: $MD_FILE"
            echo "---"
            cat "$MD_FILE"
          else
            echo "未找到生成的 MD 报告文件，请检查侦察步骤日志。"
          fi
          echo "::endgroup::"


      # ── 6. 提交并推送报告 ─────────────────────────────────────
      - name: Commit and push report
        run: |
          echo "::group::Git 配置"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

          echo "::group::添加文件"
          # 使用 find 代替 glob，避免无匹配时 git add 报 fatal
          mapfile -t MD_FILES < <(find output -name "*.md" 2>/dev/null)
          if [ ${#MD_FILES[@]} -gt 0 ]; then
            git add -f "${MD_FILES[@]}"
            echo "已添加 ${#MD_FILES[@]} 个 MD 文件"
          else
            echo "未找到 MD 文件，跳过添加"
          fi
          if [ -d data ] && [ -n "$(ls -A data/ 2>/dev/null)" ]; then
            git add -f data/
            echo "已添加 data/ 目录"
          fi
          git status
          echo "::endgroup::"


          echo "::group::提交与推送"
          if git diff --staged --quiet; then
            echo "MD 报告内容与上次相同，无需提交。"
          else
            # 从 MD 报告提取存活子域名数量
            ALIVE_COUNT=$(grep -oP '域名数量：\K[0-9]+' output/*/*.md 2>/dev/null | head -1 || echo "?")
            # 计算运行耗时
            ELAPSED=$(( RECON_END - RECON_START ))
            ELAPSED_MIN=$(( ELAPSED / 60 ))
            ELAPSED_SEC=$(( ELAPSED % 60 ))
            COMMIT_MSG="recon(shu.edu.cn): 存活 ${ALIVE_COUNT} 个子域名, 耗时 ${ELAPSED_MIN}m${ELAPSED_SEC}s [skip ci]"
            echo "提交标题: $COMMIT_MSG"
            git commit -m "$COMMIT_MSG"
            git push
            echo "已成功推送最新报告。"
          fi
          echo "::endgroup::"
